# Nginx Load Balancer Configuration for DDoS Protection

upstream web_backend {
    least_conn;
    server web_app:8000 max_fails=3 fail_timeout=30s;
}

# Rate limiting zones (temporarily relaxed for demo)
# Increased rates and larger bursts to avoid blocking the headless capturer during demos.
limit_req_zone $binary_remote_addr zone=general:10m rate=10000r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10000r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Connection limits (relaxed for demo)
    limit_conn addr 1000;
    
    # General rate limiting (relaxed for demo)
    location / {
        limit_req zone=general burst=10000 nodelay;
        limit_req_status 429;
        
        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # API endpoints with higher rate limits (relaxed for demo)
    location /api/ {
        limit_req zone=api burst=10000 nodelay;
        limit_req_status 429;
        
        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://web_backend;
        access_log off;
    }

    # Admin endpoints (no rate limit - protected by API key)
    location /admin {
        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Block common attack patterns
    location ~* \.(php|asp|aspx|jsp)$ {
        return 403;
    }
    
    # Custom error pages
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type application/json;
        return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded"}';
    }
}
